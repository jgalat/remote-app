name: Publish packages
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @remote-app/transmission-client run build
      - run: pnpm --filter @remote-app/qbittorrent-client run build
      - run: |
          VERSION=${GITHUB_REF_NAME#v}
          pnpm --filter @remote-app/transmission-client version "$VERSION" --no-git-tag-version --no-git-checks
          pnpm --filter @remote-app/qbittorrent-client version "$VERSION" --no-git-tag-version --no-git-checks
      - run: pnpm --filter @remote-app/transmission-client publish --access public --no-git-checks
      - run: pnpm --filter @remote-app/qbittorrent-client publish --access public --no-git-checks
