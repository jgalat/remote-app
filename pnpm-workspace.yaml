packages:
  - packages/*

allowBuilds:
  '@shopify/react-native-skia': true
  esbuild: true
  msgpackr-extract: true
  unrs-resolver: true

ignoredBuiltDependencies:
  - dtrace-provider

nodeLinker: hoisted

# Pin every dependency shared with the root app to the root's version, so packages/*
# (including the pinned pro submodule) never drift. "$name" means "use whatever version
# the root package.json declares", so this auto-tracks future upgrades.
overrides:
  "@hookform/resolvers": "$@hookform/resolvers"
  "@tanstack/react-query": "$@tanstack/react-query"
  "@types/react": "$@types/react"
  expo-file-system: "$expo-file-system"
  expo-router: "$expo-router"
  react: "$react"
  react-hook-form: "$react-hook-form"
  react-native: "$react-native"
  react-native-purchases: "$react-native-purchases"
  tsdown: "$tsdown"
  typescript: "$typescript"
  vitest: "$vitest"
  zod: "$zod"
